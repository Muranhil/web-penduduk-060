<!DOCTYPE html>
<html>
<head>
    <title>Sistem Data 060</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h2>Data Penduduk 060</h2>
    
    <form id="formPdk" class="mb-4">
        <input type="hidden" id="id">
        <div class="row">
            <div class="col-md-2"><input type="text" id="nik" class="form-control" placeholder="NIK" required></div>
            <div class="col-md-3"><input type="text" id="nama" class="form-control" placeholder="Nama" required></div>
            <div class="col-md-2">
                <select id="jk" class="form-control">
                    <option value="1">Laki</option>
                    <option value="0">Perempuan</option>
                </select>
            </div>
            <div class="col-md-2"><button type="submit" class="btn btn-primary" id="btnS">Simpan</button></div>
        </div>
    </form>

    <table class="table table-bordered">
        <thead><tr><th>ID</th><th>NIK</th><th>Nama</th><th>JK</th><th>Aksi</th></tr></thead>
        <tbody id="tabelData"></tbody>
    </table>

    <script>
        const API = "https://myfuncache-060-fmgchbdnhbgxcsc9.southeastasia-01.azurewebsites.net/api/HttpTriggerImplRedis";

        async function loadData() {
            const res = await fetch(API);
            const data = await res.json();
            let row = '';
            data.forEach(d => {
                row += `<tr><td>${d.Id_penduduk}</td><td>${d.nik}</td><td>${d.nama}</td>
                <td>${d.jenis_kelamin ? 'Laki' : 'Perempuan'}</td>
                <td><button class="btn btn-warning btn-sm" onclick="edit(${d.Id_penduduk}, '${d.nik}', '${d.nama}', ${d.jenis_kelamin})">Edit</button> 
                    <button class="btn btn-danger btn-sm" onclick="hapus(${d.Id_penduduk})">Hapus</button></td></tr>`;
            });
            document.getElementById('tabelData').innerHTML = row;
        }

        document.getElementById('formPdk').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('id').value;
            const data = { 
                Id_penduduk: id ? parseInt(id) : undefined,
                nik: document.getElementById('nik').value, 
                nama: document.getElementById('nama').value, 
                jenis_kelamin: document.getElementById('jk').value == '1' 
            };
            await fetch(id ? `${API}?id=${id}` : API, {
                method: id ? 'PUT' : 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            document.getElementById('formPdk').reset();
            document.getElementById('id').value = '';
            loadData();
        };

        function edit(id, nik, nama, jk) {
            document.getElementById('id').value = id;
            document.getElementById('nik').value = nik;
            document.getElementById('nama').value = nama;
            document.getElementById('jk').value = jk ? "1" : "0";
            document.getElementById('btnS').innerText = 'Update';
        }

        async function hapus(id) {
            await fetch(`${API}?id=${id}`, {method: 'DELETE'});
            loadData();
        }

        loadData();
    </script>
</body>
</html>
